# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                  Complete Default Configuration                               ║
# ║                                                                               ║
# ║  New features:                                                                ║
# ║  • Dwindle Layout - Binary tree-based tiling inspired by Hyprland             ║
# ║  • Centered Workspace Bar - macOS menu bar with centered workspace indicators ║
# ║  • Master Layout - Master/stack layout with configurable ratios               ║
# ║  • Niri/Scroll/Paper Layout - Scrollable window management                    ║
# ║                                                                               ║
# ║  Configuration Location: ~/.aerospace.toml                                    ║
# ║  Documentation: https://github.com/nikitabobko/AeroSpace                      ║
# ║                                                                               ║
# ║  This file contains ALL possible configuration options with explanations.     ║
# ║  Default values are set for optimal dwindle layout experience.                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# Commands to run after Aerospace starts
# Can be a single command (string) or multiple commands (array)
# Use 'exec-and-forget' to launch apps without blocking
# Examples:
#   after-startup-command = 'exec-and-forget open -a Ghostty'
#   after-startup-command = ['exec-and-forget open -a Safari', 'exec-and-forget open -a Slack']
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
#after-startup-command = [
#'workspace 1',
#'layout dwindle'
#]
after-startup-command = []

# Launch Aerospace automatically when you log into macOS
# Options: true, false
start-at-login = false

# Automatically reload the config when the config file is saved
# After setting this to true, reload once manually to start the auto-reloading
auto-reload-config = false

# Automatically flatten unnecessary container nesting
# Eliminates weird tree configurations for cleaner window management
# Options: true, false
# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true

# Force opposite orientation for nested containers
# Prevents same-orientation nesting (e.g., horizontal inside horizontal)
# Options: true, false
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Default layout for new workspaces
# Options: 'tiles', 'accordion', 'dwindle', 'master', 'scroll' (aka 'niri' or 'paper')
# 'dwindle' - Binary tree layout with automatic orientation
# 'master' - Master/stack layout
# 'scroll'/'niri'/'paper' - Scrollable layout
default-root-container-layout = 'dwindle'

# Default container orientation for tiles layout
# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                    DWINDLE LAYOUT                                             ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Split ratio for new dwindle containers
# Range: 0.1 to 1.9 (1.0 = 50/50 split)
# Examples:
#   1.0 = Equal split (50%/50%)
#   1.618 = Golden ratio split (~62%/38%)
#   0.618 = Inverse golden ratio (~38%/62%)
dwindle-default-split-ratio = 1.0

# Enforce aspect ratio for single windows in dwindle layout
# Format: [width, height] or [0, 0] to disable
# Examples:
#   [16, 9] = 16:9 widescreen
#   [4, 3] = 4:3 traditional
#   [21, 9] = 21:9 ultrawide
#   [1, 1] = Square
#   [0, 0] = Disabled (default)
dwindle-single-window-aspect-ratio = [0, 0]

# Tolerance for aspect ratio adjustments
# Range: 0.0 to 1.0
# Prevents tiny padding adjustments when window is close to target ratio
# Lower values = more strict, higher values = more lenient
dwindle-single-window-aspect-ratio-tolerance = 0.1

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                      MOUSE INTERACTION                                        ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Mouse resize sensitivity multiplier
# Range: 0.1 to 3.0
# Controls how aggressively windows resize when dragging with mouse
# Examples:
#   0.5 = Precise (slower, fine-grained control)
#   1.0 = Balanced (default)
#   2.0 = Aggressive (faster, coarse adjustments)
mouse-sensitivity = 0.2

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                     MASTER LAYOUT                                             ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Master window width percentage
# Range: 0.1 to 0.9 (0.5 = 50% of screen)
# Examples:
#   0.5 = Equal split (50%)
#   0.618 = Golden ratio (~62%)
#   0.66 = Two-thirds (~66%)
master-default-percent = 0.5

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                SCROLL/NIRI/PAPER LAYOUT                                       ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Focused window width ratio for scroll/niri/paper layout
# Controls how much of adjacent windows you see on the sides
# Range: 0.1 to 1.0
# Lower value = more focus, higher value = more context
# Examples:
#   0.5  = 50% width (25% peek each side) - maximum context
#   0.67 = 67% width (16.5% peek each side) - balanced
#   0.8  = 80% width (10% peek each side) - default
#   0.9  = 90% width (5% peek each side) - focused
#   1.0  = 100% width (no peek) - full screen
niri-focused-width-ratio = 0.8

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Automatically unhide applications hidden with cmd-h
# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Keyboard layout preset
# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'
    
# Custom key remapping (optional)
# Map non-standard keys to key codes
# Example (uncomment to use):
# [key-mapping.key-notation-to-key-code]
# delete = 'backspace'
# capslock = 'esc'

[gaps]
# Inner gaps (spacing between windows)
# Can be a constant or per-monitor configuration
inner.horizontal = 20
inner.vertical = 20

# Outer gaps (spacing from screen edges)
# Format: constant integer or per-monitor array
# Per-monitor array syntax:
#   outer.top = [
#     { monitor.main = 16 },           # Main monitor gets 16px
#     { monitor."Built-in" = 32 },     # Built-in display gets 32px
#     { monitor.1 = 24 },              # First monitor in sequence gets 24px
#     24                               # Default fallback (required)
#   ]
outer.left = 10
outer.bottom = 10
outer.top = 10
outer.right = 10

# Example: Different gaps for different monitors (uncomment to use)
# [gaps]
# outer.top = [
#   { monitor.main = 20 },            # Main monitor menu bar spacing
#   { monitor."Built-in" = 35 },      # MacBook notch spacing
#   { monitor.secondary = 10 },       # Secondary monitor minimal spacing
#   15                                 # Default for any other monitor
# ]

# Force specific workspaces to specific monitors
# Format: workspace-number = "monitor-pattern" or ["pattern1", "pattern2"]
# Monitor patterns:
#   "main" - Primary monitor
#   "secondary" - Non-primary monitors
#   1, 2, 3 - Monitor by sequence number (1-based)
#   "pattern" - Case-insensitive regex match (e.g., "Dell.*", "LG.*")
#
# Examples (uncomment to use):
# [workspace-to-monitor-force-assignment]
# 1 = "main"                          # Workspace 1 always on main monitor
# 2 = "main"                          # Workspace 2 always on main monitor
# 3 = "secondary"                     # Workspace 3 on any secondary monitor
# 4 = ["Built-in", 1]                 # Workspace 4 prefers Built-in, falls back to monitor 1
# 5 = "LG.*"                          # Workspace 5 on any LG monitor


# Automatically configure windows when detected
# Available conditions:
#   - app-id: Bundle identifier (use 'aerospace list-apps' to find)
#   - app-name-regex-substring: Partial regex match on app name
#   - window-title-regex-substring: Partial regex match on window title
#   - workspace: Current workspace name
#   - during-aerospace-startup: Only during Aerospace startup
#
# Available commands:
#   - layout floating/tiling
#   - move-node-to-workspace (must be last command if used)
#
# Examples (uncomment and modify to use):

# # Float all Safari windows on workspace 5
# [[on-window-detected]]
# if.app-id = 'com.apple.Safari'
# if.workspace = '5'
# run = 'layout floating'

# # Tile all Zoom meetings
# [[on-window-detected]]
# if.app-name-regex-substring = '.*Zoom.*'
# if.window-title-regex-substring = '.*Meeting.*'
# run = 'layout tiling'

# # Move Ghostty to workspace 2 on startup
# [[on-window-detected]]
# if.app-id = 'com.mitchellh.ghostty'
# if.during-aerospace-startup = true
# run = 'move-node-to-workspace 2'

# # Float System Settings/Preferences
# [[on-window-detected]]
# if.app-id = 'com.apple.systempreferences'
# run = 'layout floating'

# # Float Calculator
# [[on-window-detected]]
# if.app-id = 'com.apple.calculator'
# run = 'layout floating'

# # Move Slack to workspace 3
# [[on-window-detected]]
# if.app-id = 'com.tinyspeck.slackmacgap'
# check-further-callbacks = false
# run = 'move-node-to-workspace 3'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'
    
    # Direct resize - immediate size adjustment without entering a mode
    # alt-equal = 'resize width -50'
    # alt-minus = 'resize width +50'
    # alt-shift-equal = 'resize height -50'
    # alt-shift-minus = 'resize height +50'
    
    # Alternative: Modal resize (requires entering resize mode first)
    # Uncomment the following line to enable resize mode
    # alt-r = 'mode resize'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
    alt-b = 'workspace B'
    alt-c = 'workspace C'
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    alt-f = 'workspace F'
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    alt-n = 'workspace N'
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    alt-s = 'workspace S'
    alt-t = 'workspace T'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-f = 'move-node-to-workspace F'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'
    
    # Navigate workspaces sequentially
    #alt-tab = 'workspace next'
    #alt-shift-tab = 'workspace prev'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'
    
    # Layout switching
    #alt-shift-d = 'layout dwindle'          # Dwindle
    #alt-shift-t = 'layout tiles'            # Traditional tiling
    #alt-shift-a = 'layout accordion'        # Accordion (one window visible)
    #alt-shift-m = 'layout master'           # Master/stack
    #alt-shift-s = 'layout scroll'           # Scrollable
    
    # Toggle between floating and tiling for current window
    #alt-shift-space = 'layout floating tiling'
    
    # Balance window sizes (reset to equal sizes)
    # Especially useful after manual resizing in dwindle layout
    #alt-b = 'balance-sizes'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

